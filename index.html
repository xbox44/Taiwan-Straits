<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taiwan Strait Strategy • v0.1.1</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
  canvas { touch-action: none; border: 2px solid #334155; border-radius: 8px; background: #020617; }
  .military-btn { 
    background: #1e2937; border: 1px solid #475569; 
    padding: 12px 24px; border-radius: 8px; font-weight: 600; 
    transition: all 0.1s; 
  }
  .military-btn:active { background: #334155; transform: scale(0.98); }
  .log { font-family: ui-monospace, monospace; font-size: 13px; }
</style>
</head>
<body class="p-4">
<div class="max-w-[1200px] mx-auto">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h1 class="text-3xl font-bold tracking-tight">Taiwan Strait 2027 <span class="text-sm font-normal text-slate-400">(v0.1.1 Touch Improved)</span></h1>
      <p class="text-slate-400 text-sm">Blue defender vs Red AI • Tap blue units firmly</p>
    </div>
    <div class="flex items-center gap-4">
      <div id="turn-info" class="px-4 py-2 bg-slate-800 rounded-lg text-sm font-mono">
        TURN <span id="turn-num">1</span> • <span id="phase">BLUE PHASE</span>
      </div>
      <button onclick="endTurn()" 
              class="military-btn px-8 py-3 text-lg bg-red-600 hover:bg-red-500 border-red-500 text-white flex items-center gap-2">
        END TURN
      </button>
    </div>
  </div>

  <div class="flex gap-4">
    <div class="flex-1">
      <canvas id="game-canvas" width="1100" height="720" class="w-full max-w-[1100px]"></canvas>
      <p class="text-xs text-slate-500 mt-2 text-center">Tap blue unit icons • Larger hit area • Visual tap feedback added</p>
    </div>

    <div class="w-80 bg-slate-900 border border-slate-700 rounded-xl p-4 flex flex-col">
      <div class="mb-4">
        <h3 class="font-semibold text-lg mb-1">Selected Unit</h3>
        <div id="unit-info" class="min-h-[120px] bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm">
          <p class="text-slate-400">Tap a blue unit on the map</p>
        </div>
      </div>

      <div class="mb-4">
        <h3 class="font-semibold mb-2">Legend</h3>
        <div class="grid grid-cols-2 gap-2 text-xs">
          <div class="flex items-center gap-2"><div class="w-4 h-4 bg-red-500 rounded"></div> Red (Invader)</div>
          <div class="flex items-center gap-2"><div class="w-4 h-4 bg-blue-500 rounded"></div> Blue (Defender)</div>
        </div>
      </div>

      <div class="mt-auto">
        <button onclick="resetGame()" class="military-btn w-full text-sm py-2 border-slate-600 hover:bg-slate-800">Reset Scenario</button>
      </div>
    </div>
  </div>

  <div class="mt-4 bg-slate-950 border border-slate-700 rounded-xl p-3">
    <div class="flex items-center justify-between mb-1 px-1">
      <span class="text-xs font-semibold text-slate-400">ACTION LOG</span>
      <button onclick="clearLog()" class="text-xs text-slate-500 hover:text-slate-300">Clear</button>
    </div>
    <div id="log" class="log h-28 overflow-y-auto text-xs leading-tight text-slate-300 bg-black/40 p-2 rounded"></div>
  </div>
</div>

<script>
// Hex grid setup
const HEX_SIZE = 38;
const MAP_COLS = 17;
const MAP_ROWS = 11;
let canvas, ctx;
let units = [];
let selectedUnit = null;
let currentTurn = 1;
let currentSide = 'blue';
let logEl;
let lastTap = null;

function axialToPixel(q, r) {
  const x = HEX_SIZE * (Math.sqrt(3) * q + Math.sqrt(3) / 2 * r);
  const y = HEX_SIZE * (3 / 2 * r);
  return { x: x + 80, y: y + 60 };
}

function pixelToAxial(px, py) {
  px -= 80; py -= 60;
  let q = (Math.sqrt(3)/3 * px - 1/3 * py) / HEX_SIZE;
  let r = (2/3 * py) / HEX_SIZE;
  return hexRound(q, r);
}

function hexRound(q, r) {
  let s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const qDiff = Math.abs(rq - q), rDiff = Math.abs(rr - r), sDiff = Math.abs(rs - s);
  if (qDiff > rDiff && qDiff > sDiff) rq = -rr - rs;
  else if (rDiff > sDiff) rr = -rq - rs;
  else rs = -rq - rr;
  return { q: rq, r: rr };
}

function getHexNeighbors(q, r) {
  return [
    { q: q + 1, r: r }, { q: q + 1, r: r - 1 }, { q: q, r: r - 1 },
    { q: q - 1, r: r }, { q: q - 1, r: r + 1 }, { q: q, r: r + 1 }
  ];
}

function hexDistance(q1, r1, q2, r2) {
  return Math.max(Math.abs(q1 - q2), Math.abs(r1 - r2), Math.abs((-q1 - r1) - (-q2 - r2)));
}

function isLand(q, r) {
  if (q <= 2) return true;
  if (q >= 12 && q <= 15 && r >= 3 && r <= 8) return true;
  if (q === 10 && r === 5) return true;
  return false;
}

function createInitialUnits() {
  units = [];
  const redUnits = [
    { id: 'r1', side: 'red', type: 'AMPH', q: 1, r: 4, hp: 12, move: 2, atk: 5, def: 4 },
    { id: 'r2', side: 'red', type: 'AMPH', q: 2, r: 5, hp: 12, move: 2, atk: 5, def: 4 },
    { id: 'r3', side: 'red', type: 'M', q: 1, r: 3, hp: 8, move: 1, atk: 7, def: 3 },
    { id: 'r4', side: 'red', type: 'F', q: 2, r: 3, hp: 6, move: 4, atk: 6, def: 2 },
    { id: 'r5', side: 'red', type: 'AMPH', q: 0, r: 6, hp: 10, move: 2, atk: 5, def: 4 },
  ];
  const blueUnits = [
    { id: 'b1', side: 'blue', type: 'P', q: 13, r: 5, hp: 10, move: 1, atk: 6, def: 6 },
    { id: 'b2', side: 'blue', type: 'F', q: 14, r: 4, hp: 7, move: 5, atk: 5, def: 3 },
    { id: 'b3', side: 'blue', type: 'N', q: 11, r: 6, hp: 14, move: 3, atk: 7, def: 6 },
    { id: 'b4', side: 'blue', type: 'G', q: 13, r: 6, hp: 9, move: 2, atk: 4, def: 5 },
    { id: 'b5', side: 'blue', type: 'P', q: 14, r: 7, hp: 10, move: 1, atk: 6, def: 6 },
  ];
  units = [...redUnits, ...blueUnits];
}

function getUnitAt(q, r) {
  return units.find(u => u.q === q && u.r === r);
}

// Larger hit detection for touch
function findUnitNear(q, r, tolerance = 1) {
  for (let dq = -tolerance; dq <= tolerance; dq++) {
    for (let dr = -tolerance; dr <= tolerance; dr++) {
      const unit = getUnitAt(q + dq, r + dr);
      if (unit) return unit;
    }
  }
  return null;
}

function drawHex(q, r, fillColor, strokeColor = '#475569') {
  const { x, y } = axialToPixel(q, r);
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 6;
    const px = x + HEX_SIZE * Math.cos(angle);
    const py = y + HEX_SIZE * Math.sin(angle);
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawMap() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0c4a6e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (let q = 0; q < MAP_COLS; q++) {
    for (let r = 0; r < MAP_ROWS; r++) {
      const land = isLand(q, r);
      const fill = land ? (q <= 2 ? '#854d0e' : '#166534') : '#0369a1';
      drawHex(q, r, fill);
    }
  }
  
  ctx.fillStyle = '#f1f5f9';
  ctx.font = 'bold 16px system-ui';
  ctx.fillText('CHINA', 55, 95);
  ctx.fillText('TAIWAN', 620, 280);
  ctx.font = '12px system-ui';
  ctx.fillStyle = '#64748b';
  ctx.fillText('TAIWAN STRAIT', 380, 220);
}

function drawUnits() {
  units.forEach(unit => {
    const { x, y } = axialToPixel(unit.q, unit.r);
    const isSelected = selectedUnit && selectedUnit.id === unit.id;
    
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.fillStyle = unit.side === 'red' ? '#ef4444' : '#3b82f6';
    ctx.fill();
    if (isSelected) {
      ctx.strokeStyle = '#fbbf24';
      ctx.lineWidth = 4;
      ctx.stroke();
    }
    ctx.strokeStyle = '#1e2937';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px ui-monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(unit.type, x, y - 2);
    
    const hpPct = unit.hp / (unit.side === 'red' ? 12 : 10);
    ctx.fillStyle = '#1e2937';
    ctx.fillRect(x - 16, y + 14, 32, 5);
    ctx.fillStyle = hpPct > 0.5 ? '#22c55e' : '#f59e0b';
    ctx.fillRect(x - 16, y + 14, 32 * Math.max(0, hpPct), 5);
  });
}

function highlightRange(unit) {
  if (!unit) return;
  for (let q = 0; q < MAP_COLS; q++) {
    for (let r = 0; r < MAP_ROWS; r++) {
      const dist = hexDistance(unit.q, unit.r, q, r);
      if (dist > 0 && dist <= unit.move) {
        const { x, y } = axialToPixel(q, r);
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI / 3) * i - Math.PI / 6;
          const px = x + HEX_SIZE * Math.cos(angle);
          const py = y + HEX_SIZE * Math.sin(angle);
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(163, 163, 172, 0.25)';
        ctx.fill();
        ctx.strokeStyle = '#a3a3a8';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }
}

function draw() {
  drawMap();
  if (selectedUnit) highlightRange(selectedUnit);
  drawUnits();
  if (lastTap) {
    const {x, y} = lastTap;
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(251, 191, 36, 0.7)';
    ctx.lineWidth = 3;
    ctx.stroke();
    setTimeout(() => { lastTap = null; draw(); }, 300);
  }
}

// Unified pointer handler with improved touch detection
function handlePointer(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  let clientX = e.clientX !== undefined ? e.clientX : (e.touches ? e.touches[0].clientX : 0);
  let clientY = e.clientY !== undefined ? e.clientY : (e.touches ? e.touches[0].clientY : 0);
  
  const clickX = clientX - rect.left;
  const clickY = clientY - rect.top;
  
  lastTap = {x: clickX, y: clickY};
  draw();
  
  const hex = pixelToAxial(clickX, clickY);
  log(`Tap at (${hex.q}, ${hex.r})`);
  
  let clickedUnit = getUnitAt(hex.q, hex.r) || findUnitNear(hex.q, hex.r);
  
  if (clickedUnit) {
    if (clickedUnit.side === currentSide) {
      selectedUnit = clickedUnit;
      log(`✅ Selected ${clickedUnit.type}`);
      updateUnitInfo();
      draw();
    } else {
      log(`Enemy unit - ${currentSide.toUpperCase()} phase only`);
    }
    return;
  }
  
  // Move/attack logic
  if (selectedUnit && currentSide === selectedUnit.side) {
    const dist = hexDistance(selectedUnit.q, selectedUnit.r, hex.q, hex.r);
    if (dist > 0 && dist <= selectedUnit.move) {
      const targetUnit = getUnitAt(hex.q, hex.r);
      
      if (targetUnit && targetUnit.side !== selectedUnit.side) {
        const damage = Math.max(1, Math.floor(selectedUnit.atk - targetUnit.def + (Math.random()*3 - 1.5)));
        targetUnit.hp -= damage;
        log(`${selectedUnit.type} hits ${targetUnit.type} for ${damage}`);
        if (targetUnit.hp <= 0) {
          units = units.filter(u => u !== targetUnit);
          log(`${targetUnit.type} eliminated`);
        }
        if (selectedUnit.hp > 0) {
          selectedUnit.q = hex.q; 
          selectedUnit.r = hex.r;
        }
      } else {
        selectedUnit.q = hex.q;
        selectedUnit.r = hex.r;
        log(`${selectedUnit.type} moved to (${hex.q}, ${hex.r})`);
      }
      selectedUnit = null;
      draw();
      updateUnitInfo();
    }
  }
}

function updateUnitInfo() {
  const infoDiv = document.getElementById('unit-info');
  if (!selectedUnit) {
    infoDiv.innerHTML = '<p class="text-slate-400">Tap a blue unit on the map</p>';
    return;
  }
  const u = selectedUnit;
  infoDiv.innerHTML = `
    <div class="flex items-center gap-2 mb-2">
      <div class="w-5 h-5 rounded ${u.side === 'red' ? 'bg-red-500' : 'bg-blue-500'}"></div>
      <span class="font-bold">${u.type} (${u.side.toUpperCase()})</span>
    </div>
    <div class="grid grid-cols-2 gap-x-4 text-xs">
      <div>HP: <span class="font-mono">${u.hp}</span></div>
      <div>Move: <span class="font-mono">${u.move}</span></div>
      <div>Attack: <span class="font-mono">${u.atk}</span></div>
      <div>Defense: <span class="font-mono">${u.def}</span></div>
    </div>
    <div class="mt-2 text-[10px] text-slate-400">Position: (${u.q}, ${u.r})</div>
  `;
}

function log(msg) {
  if (!logEl) logEl = document.getElementById('log');
  const p = document.createElement('p');
  p.className = 'mb-0.5';
  p.textContent = msg;
  logEl.appendChild(p);
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
  if (logEl) logEl.innerHTML = '';
}

function doRedAI() {
  const redUnits = units.filter(u => u.side === 'red' && u.hp > 0);
  redUnits.forEach(unit => {
    let bestTarget = null;
    let bestDist = 999;
    units.filter(u => u.side === 'blue' && u.hp > 0).forEach(blue => {
      const d = hexDistance(unit.q, unit.r, blue.q, blue.r);
      if (d < bestDist) { bestDist = d; bestTarget = blue; }
    });
    if (!bestTarget) bestTarget = { q: 13, r: 5 };
    
    const neighbors = getHexNeighbors(unit.q, unit.r);
    let bestMove = null;
    let bestMoveDist = 999;
    neighbors.forEach(n => {
      if (n.q < 0 || n.q >= MAP_COLS || n.r < 0 || n.r >= MAP_ROWS) return;
      const d = hexDistance(n.q, n.r, bestTarget.q, bestTarget.r);
      if (d < bestMoveDist) {
        bestMoveDist = d;
        bestMove = n;
      }
    });
    
    if (bestMove) {
      const occupant = getUnitAt(bestMove.q, bestMove.r);
      if (!occupant || occupant.side === 'red') {
        unit.q = bestMove.q;
        unit.r = bestMove.r;
        log(`Red ${unit.type} advanced.`);
      }
    }
  });
  draw();
}

function endTurn() {
  if (currentSide === 'blue') {
    currentSide = 'red';
    document.getElementById('phase').textContent = 'RED PHASE (AI)';
    doRedAI();
    setTimeout(() => {
      currentSide = 'blue';
      currentTurn++;
      document.getElementById('turn-num').textContent = currentTurn;
      document.getElementById('phase').textContent = 'BLUE PHASE';
      selectedUnit = null;
      draw();
      updateUnitInfo();
      log(`--- Turn ${currentTurn} begins (Blue) ---`);
    }, 1200);
  } else {
    currentSide = 'blue';
    currentTurn++;
    document.getElementById('turn-num').textContent = currentTurn;
    document.getElementById('phase').textContent = 'BLUE PHASE';
    log(`--- Turn ${currentTurn} begins (Blue) ---`);
  }
}

function resetGame() {
  createInitialUnits();
  selectedUnit = null;
  currentTurn = 1;
  currentSide = 'blue';
  document.getElementById('turn-num').textContent = '1';
  document.getElementById('phase').textContent = 'BLUE PHASE';
  if (logEl) logEl.innerHTML = '';
  log('Scenario reset. Blue to move first.');
  draw();
  updateUnitInfo();
}

function initGame() {
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');
  logEl = document.getElementById('log');
  
  createInitialUnits();
  draw();
  log('Taiwan Strait 2027 v0.1.1 loaded.');
  log('Improved touch detection - tap blue units firmly.');
  log('You command Blue. Red AI will invade. Defend Taiwan!');
  
  canvas.addEventListener('click', handlePointer);
  canvas.addEventListener('touchstart', handlePointer, { passive: false });
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      selectedUnit = null;
      draw();
      updateUnitInfo();
    }
    if (e.key.toLowerCase() === 'e') endTurn();
  });
}

window.onload = initGame;
</script>
</body>
</html>
